<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow Builders — AI Digest Browser</title>
<style>
/* === Reset & Base === */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg: #faf9f6;
  --surface: #ffffff;
  --surface-2: #f3f1ed;
  --text: #111111;
  --text-secondary: #5a5855;
  --accent: #b45f06;
  --accent-soft: #e8a87c;
  --border: #d9d5ce;
  --shadow: 0 2px 0 rgba(0,0,0,.06);
  --radius: 6px;
  --font-ui: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, Ubuntu, Cantarell, Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
  --font-body: Georgia, "Noto Serif", "Source Han Serif SC", "Songti SC", STSong, serif;
}
@media (prefers-color-scheme: dark) {
  :root{
    --bg: #0d0d0d;
    --surface: #141414;
    --surface-2: #1a1a1a;
    --text: #f2f0eb;
    --text-secondary: #a6a39b;
    --accent: #e8a87c;
    --accent-soft: #b45f06;
    --border: #2a2a2a;
    --shadow: 0 2px 0 rgba(255,255,255,.04);
  }
}
html.dark{--bg:#0d0d0d;--surface:#141414;--surface-2:#1a1a1a;--text:#f2f0eb;--text-secondary:#a6a39b;--accent:#e8a87c;--accent-soft:#b45f06;--border:#2a2a2a;--shadow:0 2px 0 rgba(255,255,255,.04)}
html.light{--bg:#faf9f6;--surface:#ffffff;--surface-2:#f3f1ed;--text:#111111;--text-secondary:#5a5855;--accent:#b45f06;--accent-soft:#e8a87c;--border:#d9d5ce;--shadow:0 2px 0 rgba(0,0,0,.06)}

body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  line-height: 1.5;
  min-height: 100vh;
}

/* === Layout === */
.app{ display:flex; min-height:100vh; }
.sidebar{
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.main{ flex: 1; padding: 32px 40px; max-width: 900px; }
.mobile-bar{ display:none; }

@media (max-width: 900px){
  .app{ flex-direction: column; }
  .sidebar{ width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
  .main{ padding: 20px; max-width: 100%; }
  .mobile-bar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
}

/* === Typography === */
.brand{ font-size: 22px; font-weight: 750; letter-spacing: -0.3px; margin: 0 0 4px; font-family: var(--font-body); }
.brand small{ display:block; font-size: 12px; font-weight: 500; color: var(--text-secondary); font-family: var(--font-ui); letter-spacing: 0.2px; text-transform: uppercase; }
.section-title{ font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); margin: 24px 0 10px; }

/* === Controls === */
.control{ margin-bottom: 14px; }
.control label{ display:block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
.control input[type="text"],
.control input[type="number"],
.control select,
.control textarea{
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--text);
  font: inherit;
  outline: none;
}
.control input:focus, .control select:focus{ border-color: var(--accent); }
.control input::placeholder{ color: var(--text-secondary); opacity: 0.7; }
.range-wrap{ display:flex; align-items:center; gap:10px; }
.range-wrap input[type="range"]{ flex:1; }
.range-wrap output{ font-variant-numeric: tabular-nums; min-width: 40px; text-align:right; font-size: 12px; color: var(--text-secondary); }

.builder-list{ max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; background: var(--surface-2); }
.builder-item{ display:flex; align-items:center; gap: 8px; padding: 5px 6px; border-radius: 4px; cursor: pointer; }
.builder-item:hover{ background: rgba(0,0,0,.04); }
html.dark .builder-item:hover{ background: rgba(255,255,255,.04); }
.builder-item input{ accent-color: var(--accent); }
.builder-item .name{ font-size: 13px; }
.builder-item .count{ margin-left:auto; font-size: 11px; color: var(--text-secondary); background: var(--surface); padding: 1px 6px; border-radius: 999px; }

.btn{ display:inline-flex; align-items:center; gap:6px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn:hover{ background: var(--surface-2); }
.btn-primary{ background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-primary:hover{ opacity: 0.92; }

/* === Main Header === */
.page-header{ display:flex; align-items:flex-start; justify-content:space-between; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.page-header h1{ font-family: var(--font-body); font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.4px; }
.page-header .meta{ color: var(--text-secondary); font-size: 13px; margin-top: 6px; }
.stats{ display:flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
.stat{ padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; font-weight: 600; color: var(--text-secondary); background: var(--surface); }
.stat b{ color: var(--text); }

/* === Tabs === */
.tabs{ display:flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab{ padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--text-secondary); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
.tab.active{ color: var(--text); border-bottom-color: var(--accent); }

/* === Cards === */
.cards{ display:flex; flex-direction: column; gap: 18px; }
.card{
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
}
.card-header{ display:flex; align-items:center; gap: 12px; margin-bottom: 10px; }
.avatar{ width: 40px; height: 40px; border-radius: 50%; background: var(--surface-2); display:grid; place-items:center; font-weight: 700; font-size: 14px; color: var(--accent); border: 1px solid var(--border); flex-shrink: 0; }
.card-header .info{ flex: 1; min-width: 0; }
.card-header .name{ font-weight: 700; font-size: 15px; cursor: pointer; }
.card-header .name:hover{ text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 3px; }
.card-header .handle{ font-size: 12px; color: var(--text-secondary); }
.card-header .time{ font-size: 11px; color: var(--text-secondary); }
.card-body{ font-family: var(--font-body); font-size: 16px; line-height: 1.65; white-space: pre-wrap; margin: 0 0 12px; }
.card-body mark{ background: rgba(180,95,6,.18); color: inherit; padding: 1px 2px; border-radius: 3px; }
html.dark .card-body mark{ background: rgba(232,168,124,.22); }
.card-footer{ display:flex; align-items:center; gap: 14px; flex-wrap: wrap; }
.metric{ font-size: 12px; color: var(--text-secondary); display:inline-flex; align-items:center; gap: 4px; }
.metric b{ color: var(--text); }
.card-link{ margin-left: auto; font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none; }
.card-link:hover{ text-decoration: underline; }
.tag{ display:inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; padding: 2px 7px; border-radius: 999px; background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border); }

.empty{ color: var(--text-secondary); font-style: italic; padding: 40px 0; text-align:center; }

/* === Podcast / Blog Cards === */
.media-card .card-body{ font-family: var(--font-ui); font-size: 14px; line-height: 1.6; white-space: normal; }
.media-card h3{ font-family: var(--font-body); font-size: 18px; margin: 0 0 6px; }

/* === Modal === */
.modal-overlay{ position: fixed; inset: 0; background: rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding: 20px; z-index: 100; }
.modal-overlay.open{ display:flex; }
.modal{ background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; padding: 24px; }
.modal h2{ margin: 0 0 6px; font-family: var(--font-body); }
.modal .bio{ color: var(--text-secondary); font-size: 14px; margin-bottom: 16px; }
.modal .close{ float: right; margin-top: -4px; }

/* === Theme toggle === */
.theme-toggle{ position: fixed; bottom: 18px; right: 18px; z-index: 50; width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); display:grid; place-items:center; cursor: pointer; box-shadow: var(--shadow); font-size: 18px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="mobile-bar">
      <h2 class="brand">Follow Builders<small>AI Digest Browser</small></h2>
      <button class="btn" id="toggleFilters">Filters</button>
    </div>
    <div id="filterPanel">
      <h2 class="brand" style="margin-bottom:18px">Follow Builders<small>AI Digest Browser</small></h2>

      <div class="section-title">Sort</div>
      <div class="control">
        <select id="sortBy">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="likes">Most liked</option>
          <option value="retweets">Most retweeted</option>
        </select>
      </div>

      <div class="section-title">Sources</div>
      <div class="control">
        <div class="builder-list" id="builderList"></div>
      </div>
      <div class="control" style="display:flex; gap:8px;">
        <button class="btn" id="selectAllBuilders">All</button>
        <button class="btn" id="clearAllBuilders">None</button>
      </div>

      <div class="section-title">Filters</div>
      <div class="control">
        <label>Keyword search</label>
        <input type="text" id="keywordInput" placeholder="e.g. agent, coding, Claude">
      </div>
      <div class="control">
        <label>Exclude keywords</label>
        <input type="text" id="excludeInput" placeholder="e.g. crypto, politics">
      </div>
      <div class="control">
        <label>Min likes</label>
        <div class="range-wrap">
          <input type="range" id="likesRange" min="0" max="10000" step="50" value="0">
          <output id="likesOutput">0</output>
        </div>
      </div>
      <div class="control">
        <label>Hours back</label>
        <div class="range-wrap">
          <input type="range" id="hoursRange" min="1" max="168" step="1" value="168">
          <output id="hoursOutput">168h</output>
        </div>
      </div>
      <div class="control">
        <label>Content length</label>
        <select id="lengthSelect">
          <option value="all">All</option>
          <option value="short">Short (&lt; 100 chars)</option>
          <option value="medium">Medium (100–280)</option>
          <option value="long">Long (&gt; 280 chars)</option>
        </select>
      </div>
      <div class="control" style="margin-top:10px;">
        <button class="btn" id="resetBtn" style="width:100%">Reset filters</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <h1>Builder Feed</h1>
        <div class="meta">Curated updates from top AI builders, podcasts, and blogs.</div>
        <div class="stats" id="stats"></div>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="tweets">Tweets</button>
      <button class="tab" data-tab="podcasts">Podcasts</button>
      <button class="tab" data-tab="blogs">Blogs</button>
    </div>

    <div id="content"></div>
  </main>
</div>

<button class="theme-toggle" id="themeToggle" title="Toggle theme">◐</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="btn close" id="closeModal">Close</button>
    <h2 id="modalName"></h2>
    <div class="handle" id="modalHandle"></div>
    <div class="bio" id="modalBio"></div>
    <div class="section-title">Recent tweets</div>
    <div id="modalTweets"></div>
  </div>
</div>

const state = {
  tab: 'tweets',
  sortBy: 'newest',
  selectedBuilders: new Set((window.__FB_DATA__.builders || []).map(b => b.name)),
  keyword: '',
  exclude: '',
  minLikes: 0,
  hoursBack: 168,
  length: 'all'
};

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

function formatNumber(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const hrs = Math.max(1, Math.round(diff / 3600000));
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.round(hrs / 24);
  return days + 'd ago';
}
function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlight(text, q) {
  if (!q.trim()) return escapeHtml(text);
  const parts = text.split(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig'));
  return parts.map(p => p.toLowerCase() === q.toLowerCase() ? '<mark>' + escapeHtml(p) + '</mark>' : escapeHtml(p)).join('');
}
function initials(name) {
  return name.split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase();
}

function init() {
  renderBuilderList();
  bindEvents();
  updateTheme();
  render();
}

function renderBuilderList() {
  const list = $('#builderList');
  const data = window.__FB_DATA__;
  list.innerHTML = data.builders.map(b => {
    const count = b.tweets ? b.tweets.length : 0;
    return `<label class="builder-item">
      <input type="checkbox" value="${escapeHtml(b.name)}" checked>
      <span class="name">${escapeHtml(b.name)}</span>
      <span class="count">${count}</span>
    </label>`;
  }).join('');
}

function getFilteredTweets() {
  const data = window.__FB_DATA__;
  const now = Date.now();
  const cutoff = now - state.hoursBack * 3600000;
  const kw = state.keyword.trim().toLowerCase();
  const exParts = state.exclude.split(',').map(s => s.trim().toLowerCase()).filter(Boolean);

  let out = data.tweets.filter(t => {
    if (!state.selectedBuilders.has(t.builder.name)) return false;
    if (new Date(t.createdAt).getTime() < cutoff) return false;
    if (t.likes < state.minLikes) return false;
    const text = t.text.toLowerCase();
    if (kw && !text.includes(kw)) return false;
    if (exParts.some(p => text.includes(p))) return false;
    const len = t.text.length;
    if (state.length === 'short' && len >= 100) return false;
    if (state.length === 'medium' && (len < 100 || len > 280)) return false;
    if (state.length === 'long' && len <= 280) return false;
    return true;
  });

  out.sort((a, b) => {
    if (state.sortBy === 'newest') return new Date(b.createdAt) - new Date(a.createdAt);
    if (state.sortBy === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
    if (state.sortBy === 'likes') return b.likes - a.likes;
    if (state.sortBy === 'retweets') return b.retweets - a.retweets;
    return 0;
  });
  return out;
}

function render() {
  const data = window.__FB_DATA__;
  const content = $('#content');

  const totalTweets = data.tweets.length;
  const filtered = getFilteredTweets();
  $('#stats').innerHTML = `
    <span class="stat">Tweets: <b>${formatNumber(filtered.length)}</b> / ${formatNumber(totalTweets)}</span>
    <span class="stat">Builders: <b>${data.builders.length}</b></span>
    <span class="stat">Podcasts: <b>${data.podcasts.length}</b></span>
    <span class="stat">Blogs: <b>${data.blogs.length}</b></span>
    <span class="stat">Updated: ${timeAgo(data.generatedAt)}</span>
  `;

  if (state.tab === 'tweets') {
    if (filtered.length === 0) {
      content.innerHTML = '<div class="empty">No tweets match your filters.</div>';
      return;
    }
    const kw = state.keyword.trim();
    content.innerHTML = '<div class="cards">' + filtered.map(t => `
      <article class="card">
        <div class="card-header">
          <div class="avatar">${initials(t.builder.name)}</div>
          <div class="info">
            <div class="name" data-name="${escapeHtml(t.builder.name)}">${escapeHtml(t.builder.name)}</div>
            <div class="handle">@${escapeHtml(t.builder.handle)} · <span class="time">${timeAgo(t.createdAt)}</span></div>
          </div>
          <span class="tag">${t.isQuote ? 'Quote' : 'Tweet'}</span>
        </div>
        <p class="card-body">${highlight(t.text, kw)}</p>
        <div class="card-footer">
          <span class="metric"><b>${formatNumber(t.likes)}</b> likes</span>
          <span class="metric"><b>${formatNumber(t.retweets)}</b> retweets</span>
          <span class="metric"><b>${formatNumber(t.replies)}</b> replies</span>
          <a class="card-link" href="${escapeHtml(t.url)}" target="_blank" rel="noopener">Open on X →</a>
        </div>
      </article>
    `).join('') + '</div>';
  } else if (state.tab === 'podcasts') {
    if (data.podcasts.length === 0) {
      content.innerHTML = '<div class="empty">No podcast episodes in the current digest.</div>';
      return;
    }
    content.innerHTML = '<div class="cards">' + data.podcasts.map(p => `
      <article class="card media-card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <span class="tag">Podcast</span>
          <span class="time">${timeAgo(p.publishedAt || data.generatedAt)}</span>
        </div>
        <h3>${escapeHtml(p.name)} — ${escapeHtml(p.title)}</h3>
        <p class="card-body">${escapeHtml(p.transcript ? p.transcript.slice(0, 420) + '…' : 'No transcript available.')}</p>
        <div class="card-footer">
          <a class="card-link" href="${escapeHtml(p.url)}" target="_blank" rel="noopener">Watch on YouTube →</a>
        </div>
      </article>
    `).join('') + '</div>';
  } else if (state.tab === 'blogs') {
    if (data.blogs.length === 0) {
      content.innerHTML = '<div class="empty">No blog posts in the current digest.</div>';
      return;
    }
    content.innerHTML = '<div class="cards">' + data.blogs.map(b => `
      <article class="card media-card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <span class="tag">${escapeHtml(b.name)}</span>
          <span class="time">${b.publishedAt ? timeAgo(b.publishedAt) : 'Recently'}</span>
        </div>
        <h3>${escapeHtml(b.title)}</h3>
        <p class="card-body">${escapeHtml(b.description || (b.content ? b.content.slice(0, 520) + '…' : ''))}</p>
        <div class="card-footer">
          <a class="card-link" href="${escapeHtml(b.url)}" target="_blank" rel="noopener">Read article →</a>
        </div>
      </article>
    `).join('') + '</div>';
  }
}

function bindEvents() {
  $$('#tabs .tab').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('#tabs .tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.tab = btn.dataset.tab;
      render();
    });
  });

  $('#builderList').addEventListener('change', () => {
    const checked = $$('#builderList input:checked').map(i => i.value);
    state.selectedBuilders = new Set(checked);
    render();
  });

  $('#selectAllBuilders').addEventListener('click', () => {
    $$('#builderList input').forEach(i => i.checked = true);
    state.selectedBuilders = new Set($$('#builderList input').map(i => i.value));
    render();
  });
  $('#clearAllBuilders').addEventListener('click', () => {
    $$('#builderList input').forEach(i => i.checked = false);
    state.selectedBuilders.clear();
    render();
  });

  $('#sortBy').addEventListener('change', (e) => { state.sortBy = e.target.value; render(); });
  $('#keywordInput').addEventListener('input', (e) => { state.keyword = e.target.value; render(); });
  $('#excludeInput').addEventListener('input', (e) => { state.exclude = e.target.value; render(); });

  const likesRange = $('#likesRange');
  const likesOutput = $('#likesOutput');
  likesRange.addEventListener('input', (e) => {
    state.minLikes = +e.target.value;
    likesOutput.textContent = formatNumber(state.minLikes);
    render();
  });

  const hoursRange = $('#hoursRange');
  const hoursOutput = $('#hoursOutput');
  hoursRange.addEventListener('input', (e) => {
    state.hoursBack = +e.target.value;
    hoursOutput.textContent = state.hoursBack + 'h';
    render();
  });

  $('#lengthSelect').addEventListener('change', (e) => { state.length = e.target.value; render(); });

  $('#resetBtn').addEventListener('click', () => {
    state.sortBy = 'newest';
    state.keyword = '';
    state.exclude = '';
    state.minLikes = 0;
    state.hoursBack = 168;
    state.length = 'all';
    state.selectedBuilders = new Set((window.__FB_DATA__.builders || []).map(b => b.name));
    $('#sortBy').value = 'newest';
    $('#keywordInput').value = '';
    $('#excludeInput').value = '';
    likesRange.value = 0; likesOutput.textContent = '0';
    hoursRange.value = 168; hoursOutput.textContent = '168h';
    $('#lengthSelect').value = 'all';
    $$('#builderList input').forEach(i => i.checked = true);
    render();
  });

  const toggle = $('#toggleFilters');
  const panel = $('#filterPanel');
  if (toggle) {
    toggle.addEventListener('click', () => {
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    });
  }

  content.addEventListener('click', (e) => {
    const nameEl = e.target.closest('.name');
    if (!nameEl) return;
    const name = nameEl.dataset.name;
    const builder = window.__FB_DATA__.builders.find(b => b.name === name);
    if (!builder) return;
    openModal(builder);
  });

  $('#closeModal').addEventListener('click', closeModal);
  $('#modalOverlay').addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });

  $('#themeToggle').addEventListener('click', () => {
    const html = document.documentElement;
    if (html.classList.contains('dark')) { html.classList.remove('dark'); html.classList.add('light'); localStorage.setItem('fb-theme','light'); }
    else if (html.classList.contains('light')) { html.classList.remove('light'); localStorage.removeItem('fb-theme'); updateTheme(); }
    else { html.classList.add('dark'); localStorage.setItem('fb-theme','dark'); }
  });
}

function updateTheme() {
  const saved = localStorage.getItem('fb-theme');
  const html = document.documentElement;
  if (saved === 'dark') { html.classList.add('dark'); html.classList.remove('light'); }
  else if (saved === 'light') { html.classList.add('light'); html.classList.remove('dark'); }
}

function openModal(builder) {
  $('#modalName').textContent = builder.name;
  $('#modalHandle').textContent = '@' + builder.handle;
  $('#modalBio').textContent = builder.bio || 'No bio available.';
  const tweets = (builder.tweets || []).map(t => `<p class="card-body" style="font-size:14px; margin:8px 0; border-bottom:1px solid var(--border); padding-bottom:10px;">${escapeHtml(t.text)}<br><a href="${escapeHtml(t.url)}" target="_blank" style="font-size:12px; color:var(--accent)">Open →</a></p>`).join('');
  $('#modalTweets').innerHTML = tweets || '<div class="empty">No tweets in current digest.</div>';
  $('#modalOverlay').classList.add('open');
}
function closeModal() {
  $('#modalOverlay').classList.remove('open');
}

init();
</script>
